<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <title>Pesquisa Avançada - Foogle</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav class="navbar">
        <a href="index.html">Busca</a>
    </nav>

    <main class="advanced-layout">
        <h2 class="advanced-title">Pesquisa Avançada</h2>
        <hr class="divider">

        <form action="https://www.google.com/search" method="get">

            <p class="section-label">Encontre páginas com…</p>

            <div class="field-group">
                <label for="as_q">todas estas palavras:</label>
                <input type="text" id="as_q" name="as_q" class="searchbar-adv">
            </div>

            <div class="field-group">
                <label for="as_epq">esta palavra ou frase exata:</label>
                <input type="text" id="as_epq" name="as_epq" class="searchbar-adv">
            </div>

            <div class="field-group">
                <label for="as_oq">qualquer uma destas palavras:</label>
                <input type="text" id="as_oq" name="as_oq" class="searchbar-adv">
            </div>

            <div class="field-group">
                <label for="as_eq">nenhuma destas palavras:</label>
                <input type="text" id="as_eq" name="as_eq" class="searchbar-adv">
            </div>

            <div class="advanced-button-row">
                <input type="submit" value="Pesquisa Avançada" class="searchbutton searchbutton-blue">
            </div>

        </form>
    </main>

</body>

</html>
